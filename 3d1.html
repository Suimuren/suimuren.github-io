<div class="profile-container">

	<div class="profile-info">
		  <p class="title">3D Model Samurai Cyberpunk Showcase</p>

	  </div>
</div>
	
	

<main>
     <div class="slider-position">
    <main>
      <div class="container">
        <div class="image-container">
            
            
            
            
            <img src="Gallery/" alt="Single Image" class="slider-image">
            
          <img src="slider/before.jpg" class="image-before slider-image"  alt="black and white"/>
          <img src="slider/after.jpg" class="image-after slider-image"  alt="color photo"/>
        </div>
        <!-- step="10" -->
        <input
          type="range"
          min="0"
          max="100"
          value="50"
          aria-label="Percentage of before photo shown"
          class="slider"
        />
		  
        <div class="slider-line" aria-hidden="true"></div>
        <div class="slider-button" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"

            height="30"
            fill="currentColor"
            viewBox="0 0 256 256"
          >
            <rect width="256" height="256" fill="none"></rect>
            <line

              y1="40"

              y2="216"
              fill="none"

              stroke-linejoin="round"

            ></line>
            <line
              x1="96"
              y1="128"
              x2="16"
              y2="128"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"

            ></line>
            <polyline
              points="48 160 16 128 48 96"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="16"
            ></polyline>
            <line
              x1="160"
              y1="128"
              x2="240"
              y2="128"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"

            ></line>
            <polyline
              points="208 96 240 128 208 160"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="16"
            ></polyline>
          </svg>
        </div>
		  
		  <button class="nav-button prev-button"><img src="icon/previous.png"></button>
 			 <button class="nav-button next-button"><img src="icon/next.png"></button>
		  
		  

  

		
	


	
	</div>
